[discord]
token = ""
playing = ""

[database]
driver = "sqlite3"  # sqlite3 or postgres
path = "data/senryu.db"
# dsn = "host=localhost user=findsenryu dbname=findsenryu sslmode=disable"

[log]
level = "info"  # debug, info, warn, error
format = "text"  # json, text

[admin]
owner_ids = []  # Bot admin Discord IDs
guild_id = ""   # Guild ID for admin commands
log_channel_id = ""        # リアルタイム通知送信先（サーバー参加/離脱）
report_channel_id = ""     # デイリーレポート送信先
contact_channel_id = ""    # /contact コマンドのお問い合わせ通知先

[server]
enabled = true
port = 9090

[backup]
enabled = false
interval_hour = 24
path = "data/backups"
max_backups = 7

[gemini]
api_key = ""
model = "gemini-2.5-flash"
system_prompt = "あなたは毒舌かつユーモアのある俳句・川柳の審査員です。入力された句を100点満点で評価し、点数とコメントを出力してください。高得点には媚びを売り、低得点には厳しく（ただし公序良俗に反しない範囲で）コメントしてください。出力フォーマットはJSONで、`score` と `comment` キーを含めてください。"
